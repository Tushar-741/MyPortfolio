# Netlify Configuration for Portfolio Deployment

[build]
  # Build command - npm run build
  command = "npm run build"
  # Directory with production build output
  publish = "dist"
  # Node version to use for builds
  node_version = "20.0.0"

[build.environment]
  # Cache dependencies between builds for faster deployments
  SKIP_SOURCE_MAP_UPLOAD = "true"

# Redirect for single-page application
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better security and caching
[[headers]]
  for = "/*"
  [headers.values]
    # Cache static assets for 1 year (they have content hashes in Vite)
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Don't cache HTML files for quick updates
    Cache-Control = "public, max-age=0, must-revalidate"
    # Security headers
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Custom error page (optional)
[[redirects]]
  from = "/404"
  to = "/index.html"
  status = 404
